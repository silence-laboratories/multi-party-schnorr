name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Install stable toolchain
      uses: dtolnay/rust-toolchain@1.88
      with:
        components: clippy, rustfmt

    - uses: Swatinem/rust-cache@v2
      with:
        shared-key: "build"

    - name: Configure git credentials for private repos
      run: |
        git config --global \
          url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf \
          "https://github.com/"

    - name: Run cargo clippy
      run: cargo clippy --all --all-features --locked -- -D warnings

    - name: Run tests
      run: cargo test --all-features --release --locked
